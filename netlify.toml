[build]
  command = "npm run build"
  publish = "dist"

# Environment variables should be set in Netlify UI for security
# e.g. VITE_GOOGLE_GENAI_API_KEY

# SPA fallback so client-side routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"
